    preview_cancelled: "<green>已取消预览</green>"
    preview_failed: "<red>预览创建失败</red>"
  
  structure:
    formed: "<green>结构 %structure_id% 已形成!</green>"
    broken: "<red>结构 %structure_id% 已损坏!</red>"
    not_found: "<red>结构不存在: %structure_id%</red>"
    no_blocks: "<yellow>警告: 此结构没有定义任何方块!</yellow>"
    add_blocks_hint: "<gray>请在 YAML 配置中添加 blocks 部分</gray>"
