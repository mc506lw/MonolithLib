addon: "MonolithLib"

item:
  test_controller:
    name: "测试控制器"
    lore: "用于结构测试的控制器方块"
  furnace_core:
    name: "熔炉核心"
    lore: "用于熔炼结构的熔炉核心方块"
  machine_core:
    name: "机器核心"
    lore: "用于复杂机器的机器核心方块"
  custom_controller:
    name: "自定义控制器"
    lore: "用于自定义结构的通用控制器"

message:
  prefix: "<gold>[MonolithLib]</gold>"
  prefix_test: "<gray>[MLTest]</gray>"
  
  permission_denied: "<red>权限不足!</red>"
  player_only: "<red>此命令只能由玩家执行!</red>"
  
  preview:
    started: "<green>已启动预览模式: %structure_id% (%facing%)</green>"
    stopped: "<green>已停止 %count% 个预览</green>"
    expired: "<yellow>预览已过期</yellow>"
    no_active: "<red>你当前没有活动的预览</red>"
    layer_changed: "<green>已切换到层: %layer%</green>"
    layer_up: "<green>已切换到上一层</green>"
    layer_down: "<green>已切换到下一层</green>"
    layer_top: "<red>已经是最高层了</red>"
    layer_bottom: "<red>已经是最低层了</red>"
    layer_invalid: "<red>无效的层数: %layer%</red>"
    layer_out_of_range: "<red>层数超出范围</red>"
    current_layer: "<gray>当前层: <white>%current%/%max%</white></gray>"
    current_position: "<gray>当前位置: <white>%x%, %y%, %z%</white></gray>"
    use_layer_command: "<gray>使用 /mltest layer up/down 切换层</gray>"
    progress: "<gray>进度: <white>%correct%/%total%</white> <green>%completed%</green></gray>"
    completed: "<green>结构 %structure_id% 已完成!</green>"
    controller_broken: "<red>控制器方块已被破坏，预览已取消</red>"
    not_found: "<red>结构不存在: %structure_id%</red>"
