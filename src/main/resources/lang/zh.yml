      registered: "<gray>已注册结构:</gray> <white>%count%</white>"
      import_dir: "<gray>导入目录:</gray> <white>%path%</white>"
      blueprint_dir: "<gray>蓝图目录:</gray> <white>%path%</white>"
      product_dir: "<gray>成品目录:</gray> <white>%path%</white>"
      formats: "<gray>支持格式:</gray> <white>.mnb, .schem, .litematic, .nbt</white>"
