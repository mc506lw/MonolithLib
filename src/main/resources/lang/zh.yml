      test_rebar: "<white>test_rebar_machine</white> <gray>- Rebar组件机器</gray>"
      test_loose: "<white>test_loose_furnace</white> <gray>- 宽松匹配熔炉</gray>"
      test_blocks: "<gray>测试方块:</gray>"
      block_test_controller: "<aqua>monolith:test_controller</aqua> <gray>- 工作台材质</gray>"
      block_furnace_core: "<aqua>monolith:furnace_core</aqua> <gray>- 熔炉材质</gray>"
      block_machine_core: "<aqua>monolith:machine_core</aqua> <gray>- 高炉材质</gray>"
      block_custom_controller: "<aqua>monolith:custom_controller</aqua> <gray>- 磁石材质 (通用控制器)</gray>"
    
    reload:
      starting: "<green>正在重新加载...</green>"
      complete: "<green>重新加载完成! 共加载 %count% 个结构</green>"
    
    list:
      title: "<gold>[MonolithLib] 已注册结构 (%count%):</gold>"
      empty: "<yellow>暂无已注册的结构</yellow>"
      hint: "<gray>提示: 将结构文件放入 %path%</gray>"
      formats: "<gray>支持格式: .mnb, .schem, .litematic, .nbt</gray>"
    
    files:
      title: "<gold>[MonolithLib] 文件目录:</gold>"
      imports: "<gray>imports/</gray> <white>- 待导入文件</white>"
      blueprints: "<gray>blueprints/</gray> <white>- 蓝图 (原始结构 + 配置)</white>"
      products: "<gray>products/</gray> <white>- 成品 (最终可用结构)</white>"
      imports_title: "<gold>[MonolithLib] 待导入 (%count%):</gold>"
      blueprints_title: "<gold>[MonolithLib] 蓝图 (%count%):</gold>"
      products_title: "<gold>[MonolithLib] 成品 (%count%):</gold>"
