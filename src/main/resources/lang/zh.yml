    complete: "初始化完成! 版本: %version%"
    shutting_down: "正在关闭..."
    shutdown_complete: "已关闭"
    registering_structure: "注册结构: %id% (%size%, %count% 非空方块)"
    loaded_structures: "共加载 %count% 个结构"
    test_module_init: "初始化测试模块..."
    test_module_complete: "测试模块初始化完成! 使用 /mltest 查看命令"
    test_structures_registered: "已注册 %count% 个测试结构"
    test_blocks_registered: "已注册 %count% 个测试 Rebar 方块"
