      rebar_disabled: "<red>未检测到</red>"
      rebar_integration: "<gray>Rebar 集成:</gray> %status%"
    
    usage: "<red>用法: %usage%</red>"
    point_at_controller: "<red>请指向一个已注册的控制器方块!</red>"
    controller_must_be_rebar: "<gray>控制器必须是 Rebar 方块且关联了结构</gray>"
    construct_failed: "<red>建造启动失败</red>"
  
  test:
    controller_detected: "<gray>[MLTest] 检测到 test_controller -> test_simple_3x3</gray>"
    furnace_detected: "<gray>[MLTest] 检测到 furnace_core -> test_loose_furnace</gray>"
    machine_detected: "<gray>[MLTest] 检测到 machine_core -> test_rebar_machine</gray>"
    rebar_required: "<aqua>[MLTest] 此结构需要 Rebar 组件!</aqua>"
    custom_detected: "<gray>[MLTest] 检测到 custom_controller</gray>"
    custom_hint: "<yellow>[MLTest] 这是一个通用控制器，请在 YAML 中配置对应结构</yellow>"
    preview_started: "<green>已启动预览: %structure_id%</green>"
  
  rebar:
    integration_enabled: "Rebar 集成已启用"
    integration_disabled: "未检测到 Rebar，跳过集成"
    integration_failed: "Rebar 初始化失败: %error%"
  
  io:
    imported_blueprint: "已导入蓝图: %name% (%count% 方块)"
    rebuilt_product: "已重建产品: %name%"
    loaded_standalone: "加载独立产品: %name%"
    load_failed: "加载 .mnb 文件失败: %file% - %error%"
    save_failed: "保存 .mnb 文件失败: %file% - %error%"
  
  init:
