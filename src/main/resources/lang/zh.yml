# ============================================================
# MonolithLib 消息目录 — 中文
# ============================================================
#
# 颜色语义（Adventure 命名颜色）:
#   <red>     错误、禁止、失败、严重阻断
#   <green>   成功、完成、启用、确认
#   <yellow>  警告、进行中、待处理、需注意
#   <gray>    标签、提示、次要信息、操作指引
#   <white>   动态值、内容正文
#   <gold>    标题、头部、品牌前缀
#   <aqua>    特殊高亮（Rebar、调试）
#
# 前缀约定:
#   错误/成功/警告 → "<gold>[MonolithLib]</gold> " 前缀
#   信息/提示/标签  → 无前缀（输出更干净）
#
# 占位符约定: %变量名%
#
# Rebar 翻译键解析规则：
#   键 "monolithlib.X.Y" → 去掉命名空间前缀 → 在 YAML 根级别查找 "X.Y"
#   因此所有类别（item/chat/...）必须在顶层，不可嵌套！
# ============================================================

addon: "MonolithLib"

# ──────────────────────────────────────────────
# ITEM  — Rebar 物品翻译
# ──────────────────────────────────────────────
item:
  test_controller:
    name: "<gold>测试控制器"
    lore:
      - "<gray>用于结构测试的控制器方块"
  furnace_core:
    name: "<gold>熔炉核心"
    lore:
      - "<gray>用于熔炼结构的熔炉核心方块"
  machine_core:
    name: "<gold>机器核心"
    lore:
      - "<gray>用于复杂机器的机器核心方块"
  custom_controller:
    name: "<gold>自定义控制器"
    lore:
      - "<gray>用于自定义结构的通用控制器"
  blueprint_table:
    name: "<gold>蓝图桌"
    lore:
      - "<gray>放置后可创建蓝图物品"
  virtual_display_anchor:
    name: "<gray>虚拟展示锚点"
    lore:
      - "<gray>用于虚拟显示实体的锚点方块"
  selection_wand:
    name: "<yellow>选区魔杖"
    lore_0: "<gray>左键设置起点 A"
    lore_1: "<gray>右键设置终点 B"
    lore_2: "<gray>然后使用 /ml save <名称> 保存"
  blueprint_item:
    name: "<aqua>蓝图: %blueprint_id%"
    lore:
      - "<gray>蓝图: <white>%blueprint_id%</white>"
      - "<gray>尺寸: <white>%size%</white>"
      - "<gray>右键空气方块可放置工地"

# ──────────────────────────────────────────────
# CHAT  —  所有玩家面向的聊天消息
# ──────────────────────────────────────────────
chat:

  # ─── 通用共享消息 ───
  common:
    prefix: "<gold>[MonolithLib]</gold>"
    error_permission_denied: "<red>[MonolithLib] 权限不足。</red>"
    error_player_only: "<red>[MonolithLib] 此命令只能由玩家执行。</red>"
    error_inventory_full: "<red>[MonolithLib] 背包已满，物品已掉落至地面。</red>"
    hint_tab_complete: "<gray>按 Tab 键自动补全名称</gray>"

  # ─── 选区魔杖消息 ───
  selection:
    pos1_set: "<green>[MonolithLib] Pos1 <white>已设置到 (%x%, %y%, %z%)</white>"
    complete: "<gray>[MonolithLib] 选区已完整: <white>%count% 个方块</white>"
    hint_pos2: "<gray>[MonolithLib] 请右键设置 Pos2</gray>"
    err_no_pos1: "<red>[MonolithLib] 请先左键设置 Pos1!</red>"
    err_different_world: "<red>[MonolithLib] Pos1 和 Pos2 必须在同一世界!</red>"
    pos2_set: "<green>[MonolithLib] Pos2 <white>已设置到 (%x%, %y%, %z%)</white>"
    hint_save: "<gray>[MonolithLib] 使用 /ml save &lt;名称&gt; 保存为 .raw.mnb</gray>"

  # ─── 命令系统 ───
  command:

    # 帮助菜单（多行）
    help:
      header: ""
      title: "<gold><bold>[MonolithLib]</bold> <white>命令帮助</white></gold>"
      separator: "<gray><strikethrough>                                    </strikethrough></gray>"
      footer: "<gray><strikethrough>                                    </strikethrough></gray></gray>"
      footer_blank: ""

      section_preview: "<yellow>/ml preview</yellow> <gray>- 结构预览 <red>[OP]</red>"
      section_preview_arg: "  <white>%arg%</white>                    <gray>%desc%</gray>"
      section_build: "<yellow>/ml build</yellow> <gray>- 建造命令</gray>"
      section_bp: "<yellow>/ml bp</yellow> <gray>- 蓝图管理</gray>"
      section_site: "<yellow>/ml site</yellow> <gray>- 工地管理</gray>"
      section_edit: "<yellow>/ml edit</yellow> <gray>- 编辑器工具 <red>[OP]</red></gray>"
      section_reload: "<yellow>/ml reload</yellow> <gray>- 重载所有结构 <red>[管理员]</red></gray>"

      # 重载
      reload_starting: "<green>[MonolithLib] 正在重载...</green>"
      reload_complete: "<green>[MonolithLib] 重载完成！共加载 %count% 个结构。</green>"

      # 列出蓝图
      list_title: "<gold><bold>[MonolithLib]</bold> <white>已注册蓝图 (%count%)</white></gold>"
      list_entry: "  <gray>-</gray> <white>%id%</white> <gray>(%size%，%block_count% 方块)%rebar_tag%</gray>"
      list_empty: "<yellow>暂无已注册的蓝图。</yellow>"
      list_hint: "<gray>提示：将 .schem/.litematic/.nbt 文件放入 %path%</gray>"
      list_formats: "<gray>支持格式：<white>.mnb, .schem, .litematic, .nbt</white></gray>"

      # 信息查询
      info_title: "<gold><bold>[MonolithLib]</bold> <white>插件信息</white></gold>"
      info_version: "<gray>版本:</gray>       <white>%version%</white>"
      info_registered: "<gray>蓝图数:</gray>     <white>%count%</white>"
      info_import_dir: "<gray>导入目录:</gray>   <white>%path%</white>"
      info_blueprint_dir: "<gray>蓝图目录:</gray>  <white>%path%</white>"
      info_product_dir: "<gray>成品目录:</gray>  <white>%path%</white>"
      info_formats: "<gray>支持格式:</gray>   <white>.mnb, .schem, .litematic, .nbt</white>"
      info_rebar_enabled: "<green>已启用</green>"
      info_rebar_disabled: "<red>未检测到</red>"
      info_rebar_integration: "<gray>Rebar 集成：</gray> %status%"
      info_bp_title: "<gold><bold>[蓝图]</bold> <white>%id%</white></gold>"
      info_bp_size: "<gray>尺寸：</gray>       <white>%x% × %y% × %z%</white>"
      info_bp_blocks: "<gray>方块数：</gray>    <white>%count%</white>"
      info_bp_name: "<gray>名称：</gray>       <white>%name%</white>"
      info_bp_desc: "<gray>描述：</gray>       <white>%desc%</white>"
      info_bp_not_found: "<red>未找到蓝图：%id%</red>"

      # 蓝图给予
      bp_given: "<green>[MonolithLib] 已给予蓝图：%id%</green>"
      bp_not_found: "<red>未找到蓝图：%id%</red>"
      bp_no_id: "<red>请指定一个蓝图 ID。</red>"
      bp_hint: "<gray>用法：/ml bp give <蓝图ID></gray>"
      bp_inventory_full: "<red>[MonolithLib] 背包已满，物品已掉落至地面。</red>"

      # 用法错误（通用）
      err_usage_preview: "<red>用法：/ml preview <蓝图ID> [朝向]</red>"
      err_usage_preview_stop: "<gray>  stop              停止预览</gray>"
      err_usage_build: "<red>用法：/ml build <here|easy|printer></red>"
      err_usage_build_here: "<gray>  here <ID> [朝向]  在当前位置一键建造</gray>"
      err_usage_build_easy: "<gray>  easy [on|off]       切换轻松放置模式</gray>"
      err_usage_build_printer: "<gray>  printer [on|off]    切换自动打印模式</gray>"
      err_usage_bp: "<red>用法：/ml bp <list|info|give></red>"
      err_usage_bp_list: "<gray>  list              列出所有蓝图</gray>"
      err_usage_bp_info: "<gray>  info <ID>         查看蓝图详情</gray>"
      err_usage_bp_give: "<gray>  give <ID>         给予蓝图物品</gray>"
      err_usage_site: "<red>用法：/ml site <list|info|cancel></red>"
      err_usage_site_list: "<gray>  list              活跃工地列表</gray>"
      err_usage_site_info: "<gray>  info              附近工地状态</gray>"
      err_usage_site_cancel: "<gray>  cancel            取消附近工地</gray>"
      err_usage_edit: "<red>用法：/ml edit <wand|save|merge></red>"
      err_usage_edit_wand: "<gray>  wand              获取选区魔杖</gray>"
      err_usage_edit_save: "<gray>  save <名称> [--scaffold|--assembled]</gray>"
      err_usage_edit_merge: "<gray>  merge <a> <b>      合并两个结构</gray>"

      # 子命令错误
      err_unknown_subcmd_preview: "<red>未知子命令：%arg%</red>"
      err_available_preview: "<gray>可用：show, stop</gray>"
      err_unknown_subcmd_build: "<red>未知子命令：%arg%</red>"
      err_available_build: "<gray>可用：here, easy, printer</gray>"
      err_unknown_subcmd_bp: "<red>未知子命令：%arg%</red>"
      err_available_bp: "<gray>可用：list, info, give</gray>"
      err_unknown_subcmd_site: "<red>未知子命令：%arg%</red>"
      err_available_site: "<gray>可用：list, info, cancel</gray>"
      err_unknown_subcmd_edit: "<red>未知子命令：%arg%</red>"
      err_available_edit: "<gray>可用：wand, save, merge</gray>"

      # 蓝图未找到（共用）
      err_blueprint_not_found: "<red>未找到蓝图：%id%</red>"
      err_hint_bp_list: "<gray>使用 /ml bp list 查看可用蓝图</gray>"

      # 建造失败
      err_build_failed: "<red>[MonolithLib] 启动建造失败。</red>"

      # 编辑器专用
      edit_no_selection: "<red>请先使用选区魔杖选择区域。</red>"
      edit_save_dev: "<yellow>编辑器保存功能开发中...</yellow>"
      edit_save_failed: "<red>保存失败：%error%</red>"
      edit_merge_dev: "<yellow>编辑器合并功能开发中...</yellow>"
      edit_merge_failed: "<red>合并失败：%error%</red>"
      wand_given: "<green>[MonolithLib] 已获得选区魔杖。</green>"
      wand_hint: "<gray>左键设置起点 A，右键设置终点 B</gray>"

    # 工地列表与详情
    site:
      list_title: "<gold><bold>[MonolithLib]</bold> <white>活跃工地 (%count%)</white></gold>"
      list_entry_state_building: "<green>[建造中]</green>"
      list_entry_state_awaiting: "<yellow>[等待核心]</yellow>"
      list_entry_state_virtual: "<gray>[虚拟预览]</gray>"
      list_entry: "  %state% <white>%blueprint_id%</white> <gray>@ (%x%, %y%, %z%)</gray>"
      list_none: "<gray>附近没有活跃的工地。</gray>"
      info_title: "<gold><bold>[工地]</bold> <white>%blueprint_id%</white></gold>"
      info_state: "<gray>状态：</gray>   <white>%state%</white>"
      info_position: "<gray>位置：</gray>  <white>(%x%, %y%, %z%)</white>"
      info_facing: "<gray>朝向：</gray>  <white>%facing%</white>"
      info_progress: "<gray>进度：</gray>  <white>%placed%/%total%</white> <gray>(%percent%%)</gray>"
      info_completed: "<green>  ✓ 已完工</green>"
      err_none_nearby: "<gray>附近没有工地。</gray>"
      err_none_cancel: "<gray>附近没有可取消的工地。</gray>"
      cancelled: "<green>[MonolithLib] 工地已取消：%blueprint_id%</green>"

  # ─── 工地生命周期 ───
  build_site:
    preview_cancelled: "<red>[MonolithLib] 工地预览已取消。</red>"
    err_target_not_air: "<red>[MonolithLib] 目标位置不是空气或可替换方块！</red>"
    err_site_exists: "<red>[MonolithLib] 此位置已有工地：%blueprint_id%</red>"
    err_blueprint_corrupted: "<red>[MonolithLib] 蓝图物品数据损坏！</red>"
    err_blueprint_unregistered: "<red>[MonolithLib] 蓝图 '%blueprint_id%' 未注册！</red>"
    err_preview_create_fail: "<red>[MonolithLib] 预览创建失败！</red>"
    err_validation_failed: "<red>[MonolithLib] 验证未通过，无法放置！</red>"
    hint_fix_issues: "<gray>请解决上述问题后重试。</gray>"
    err_create_fail: "<red>[MonolithLib] 工地创建失败（可能位置冲突）！</red>"
    created: "<green>[MonolithLib] 工地创建成功！</green>"
    info_line: "<gray>蓝图：</gray> <white>%blueprint_id%</white> <gray>|</gray> <gray>朝向：</gray> <white>%facing%</white>"
    layers_info: "<gray>共 <white>%total%</white> 层，当前第 <white>%current%</white> 层</gray>"
    hint_core: "<gray>核心位置用红色玻璃标记 — 破坏它可取消工地并返还蓝图</gray>"
    existing_blocks: "<gray>检测到 <white>%count%</white> 个已有方块</gray>"
    layer_completed: "<green>[MonolithLib] 第 %layer% 层已完成！</green>"
    err_wrong_controller: "<red>[MonolithLib] 请放置正确的控制器！</red>"
    controller_required: "<gray>需要：</gray> <white>%key%</white>"
    err_place_controller_first: "<red>[MonolithLib] 请先在核心位置（金色发光标记）放置控制器！</red>"
    err_core_blocked: "<red>[MonolithLib] 核心位置无法放置方块！破坏红色玻璃可取消工地</red>"
    core_placed_validating: "<yellow>[MonolithLib] 核心控制器已放置！正在进行最终验证...</yellow>"
    err_incomplete: "<red>[MonolithLib] 结构未完成！缺少 %missing% 个方块</red>"
    completion_rate: "<gray>完成度：</gray> <white>%rate%%</white>"
    warn_blocks_need_fix: "<yellow>[MonolithLib] 检测到 %count% 个方块状态需要修正...</yellow>"
    blocks_fixed: "<green>[MonolithLib] 已自动修正 %count% 个方块状态</green>"
    activated: "<green>[MonolithLib] 多方块结构已激活！</green>"
    complete_waiting: "<yellow>[MonolithLib] 结构已完成，等待 Rebar 检测...</yellow>"
    completed_broadcast: "<green>[MonolithLib] 工地 '%blueprint_id%' 已完工！玩家 %player% 完成了建造</green>"
    all_layers_complete: "<yellow>[MonolithLib] 所有层级建造完成！正在进行最终验证...</yellow>"
    all_layers_progress: "<gray>完成度：</gray> <white>%rate%%</white> <gray>(%matched%/%total%)</gray>"
    all_layers_fix: "<yellow>[MonolithLib] 检测到 %count% 个方块状态需要修正，正在自动修正...</yellow>"
    shell_done_controller: "<green>[MonolithLib] 外壳建造完毕！请放置核心控制器以激活</green>"
    shell_controller_key: "<gray>控制器：</gray> <white>%key%</white>"
    shell_core_marker: "<gray>核心位置显示为金色发光方块</gray>"
    shell_done_no_controller: "<green>[MonolithLib] 外壳建造完毕！请在核心位置放置方块以完成</green>"
    cancelled_returned: "<green>[MonolithLib] 工地已取消！蓝图已返还</green>"
    cancelled_broadcast: "<gray>[MonolithLib] 玩家 %player% 取消了工地 '%blueprint_id%'</gray>"
    block_destroyed_revert: "<yellow>[MonolithLib] 工地方块被破坏！金色标记消失，回退到第 %layer% 层</yellow>"
    disassembled: "<red>[MonolithLib] 核心控制器被破坏！整个结构已解体，所有物品已掉落，工地回到初始状态</red>"
    err_has_active_preview: "<red>[MonolithLib] 当前有活跃的工地预览，无法开启建造模式</red>"
    preview_expired: "<red>[MonolithLib] 预览已超时自动取消</red>"
    preview_countdown: "<yellow>预览将在 <red>%countdown秒</red> 后自动取消</yellow>"

    # 预览悬浮框（全息风格）
    preview_header: "<yellow>========== 工地预览 =========="
    preview_blueprint: "<gray>蓝图：<white>%blueprint_id%</white></gray>"
    preview_facing: "<gray>朝向：<white>%facing%</white></gray>"
    preview_size: "<gray>范围：<white>%width% × %height% × %depth%</white></gray>"
    preview_position: "<gray>位置：<white>(%min_x%, %min_y%, %min_z%) ~ (%max_x%, %max_y%, %max_z%)</white></gray>"
    preview_valid: "<green>✓ 验证通过，可以放置</green>"
    preview_errors: "<red>✗ 检测到 %count% 个问题：</red>"
    preview_warnings: "<gold>⚠ 警告：</gold>"
    preview_instructions: "<gray>右键确认放置，潜行+右键取消</gray>"
    preview_auto_cancel: "<gray>预览将在 <red>%seconds秒</red> 后自动取消</gray>"
    preview_footer: "<yellow>=============================="

    # 新工地消息
    err_vm_zone_block: "<red>[MonolithLib] 虚拟机器区域禁止放置方块</red>"
    preview_cancelled_hotbar: "<yellow>[MonolithLib] 切换物品栏，预览已取消</yellow>"
    err_position_in_site: "<red>[MonolithLib] 该位置已在工地范围内</red>"
    preview_moved: "<green><bold>[MonolithLib]</bold> <white>预览已移动到新位置</white></green>"
    preview_rotated: "<green><bold>[MonolithLib]</bold> <white>预览已旋转到新方向</white></green>"
    preview_confirm_hint: "<green><bold>[MonolithLib]</bold> <white>再次右键同一位置 <yellow>确认创建</yellow> 工地</white></green>"
    preview_timeout_hint: "<gray>(30秒内有效，移动或滚动离开较远会取消)</gray>"
    all_layers_complete_hint: "<yellow>[MonolithLib] 所有层已完整，请放置核心控制器</yellow>"
    structure_disassembled_retry: "<yellow>[MonolithLib] 结构已解体，重新进入建造模式 (当前层: %layer%)</yellow>"
    structure_disassembled_retry_no_layer: "<yellow>[MonolithLib] 结构已解体，重新进入建造模式</yellow>"

  # ─── 建造模式（轻松放置 + 自动打印 合并） ───
  build_mode:
    # 模式切换响应
    easybuild_enabled: "<green>[MonolithLib] 轻松放置模式已启用</green>"
    easybuild_hint_1: "<gray>对着幽灵方块右键可自动放置匹配的方块</gray>"
    easybuild_hint_2: "<gray>创造模式下无需任何材料</gray>"
    easybuild_hint_3: "<gray>离开工地范围1分钟后自动关闭</gray>"
    easybuild_disabled: "<red>[MonolithLib] 轻松放置模式已关闭</red>"
    printer_enabled: "<green>[MonolithLib] 自动打印模式已启用</green>"
    printer_hint_1: "<gray>自动放置周身4格范围内的幽灵方块</gray>"
    printer_hint_2: "<gray>创造模式下无需任何材料</gray>"
    printer_hint_3: "<gray>离开工地范围1分钟后自动关闭</gray>"
    printer_disabled: "<red>[MonolithLib] 自动打印模式已关闭</red>"

    # 共用模式错误
    err_no_site_easybuild: "<red>[MonolithLib] 附近没有工地，无法开启轻松放置模式</red>"
    err_no_site_printer: "<red>[MonolithLib] 附近没有工地，无法开启自动打印模式</red>"
    err_mode_auto_disabled: "<red>[MonolithLib] %mode% 已自动关闭（离开工地范围过久）</red>"
    left_range_countdown: "<yellow>[MonolithLib] 已离开工地范围，<red>%countdown秒</red> 后自动关闭</yellow>"
    usage_litematica: "<red>用法：/ml litematica <easybuild|printer></red>"

    # 进度消息（两种模式共用）
    layer_completed: "<green>[MonolithLib] 第 %layer% 层完成！自动切换到下一层...</green>"
    all_complete: "<yellow>[MonolithLib] 所有层级建造完成！正在进行最终验证...</yellow>"
    progress: "<gray>完成度：</gray> <white>%rate%%</white> <gray>(%matched%/%total%)</gray>"
    need_fix: "<yellow>[MonolithLib] 检测到 %count% 个方块状态需要修正，正在自动修正...</yellow>"
    fixed: "<green>[MonolithLib] 已自动修正 %count% 个方块状态</green>"
    shell_complete: "<green>[MonolithLib] 外壳建造完毕！请放置核心控制器以激活</green>"
    shell_controller: "<gray>控制器：</gray> <white>%key%</white>"
    shell_complete_no_core: "<green>[MonolithLib] 外壳建造完毕！请在核心位置放置方块以完成</green>"

  # ─── 结构预览（全范围幽灵渲染） ───
  preview:
    started: "<green>已启动预览模式：%structure_id%（%facing%）</green>"
    stopped: "<green>已停止 %count% 个预览</green>"
    expired: "<yellow>预览已过期</yellow>"
    err_no_active: "<red>你当前没有活动的预览</red>"
    layer_changed: "<green>已切换到第 %layer% 层</green>"
    layer_up: "<green>已切换到上一层</green>"
    layer_down: "<green>已切换到下一层</green>"
    err_layer_top: "<red>已经是最高层了</red>"
    err_layer_bottom: "<red>已经是最低层了</red>"
    err_layer_invalid: "<red>无效的层数：%layer%</red>"
