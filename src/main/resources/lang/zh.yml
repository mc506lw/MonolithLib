    block_count: "<gray>方块数: %count%</gray>"
    slots: "<gray>槽位: %slots%</gray>"
    custom_data: "<gray>自定义数据: %count% 项</gray>"
  
  command:
    help:
      title: "<gold>[MonolithLib] 帮助:</gold>"
      reload: "<gray>/ml reload</gray> <white>- 重新加载所有结构</white>"
      list: "<gray>/ml list</gray> <white>- 列出所有已注册结构</white>"
      files: "<gray>/ml files</gray> <white>- 列出结构文件</white>"
      preview: "<gray>/ml preview</gray> <white>- 预览结构 (指向控制器)</white>"
      construct: "<gray>/ml construct</gray> <white>- 一键建造 (指向控制器)</white>"
      info: "<gray>/ml info</gray> <white>- 显示插件信息</white>"
